<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page Feedbacker</title>
    <meta name="description" content="Get instant, actionable feedback on your landing page.">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="container bg-white shadow rounded-lg mt-10">
        <h1 class="text-4xl font-bold text-center mb-6">Landing Page Feedbacker</h1>
        <p class="text-center text-lg mb-8">Paste your URL and get instant, actionable feedback to boost conversions.</p>
        
        <div class="mb-6">
            <input type="url" id="pageUrl" placeholder="https://yourlandingpage.com" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button id="getFeedbackBtn" class="w-full bg-blue-600 text-white p-3 rounded hover:bg-blue-700 transition duration-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
            Get Feedback
        </button>
        <div class="loader mt-4" id="loader"></div>
        <div id="feedbackOutput" class="mt-8 p-4 bg-gray-50 border border-gray-200 rounded hidden">
            <h2 class="text-2xl font-semibold mb-4">Feedback:</h2>
            <div id="feedbackContent"></div>
        </div>
        <p class="text-center text-sm text-gray-500 mt-6">Get detailed insights for just $9.99.</p>
    </div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        const stripe = Stripe('pk_test_TYooMQauvdEDq54NiTdszJPg'); // Replace with your actual publishable key
        const getFeedbackBtn = document.getElementById('getFeedbackBtn');
        const pageUrlInput = document.getElementById('pageUrl');
        const feedbackOutput = document.getElementById('feedbackOutput');
        const feedbackContent = document.getElementById('feedbackContent');
        const loader = document.getElementById('loader');

        getFeedbackBtn.addEventListener('click', async () => {
            const url = pageUrlInput.value;
            if (!url) {
                alert('Please enter a URL.');
                return;
            }
            loader.style.display = 'block';
            getFeedbackBtn.disabled = true;
            feedbackOutput.classList.add('hidden');

            try {
                // Placeholder for actual API call, for now simulating payment redirect
                const response = await fetch('/api/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url }),
                });

                const session = await response.json();

                if (session.error) {
                    alert(session.error);
                    loader.style.display = 'none';
                    getFeedbackBtn.disabled = false;
                    return;
                }

                const result = await stripe.redirectToCheckout({
                    sessionId: session.id
                });

                if (result.error) {
                    alert(result.error.message);
                }

            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred. Please try again.');
            } finally {
                loader.style.display = 'none';
                getFeedbackBtn.disabled = false;
            }
        });

        // In a real scenario, after successful payment, a webhook would trigger feedback generation
        // and the user would be redirected to a page showing the feedback or it would be emailed.
        // For this simple example, we'll simulate output if payment was successful (which is not how Stripe works directly post-redirect).
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('payment_success') === 'true') {
            feedbackOutput.classList.remove('hidden');
            feedbackContent.innerHTML = `
                <p><strong>Clear CTA:</strong> Looks good! Your main call to action is prominent.</p>
                <p><strong>Social Proof:</strong> No testimonials or reviews found. Consider adding some!</p>
                <p><strong>Mobile Responsiveness:</strong> Ensure your meta viewport tag is correctly set.</p>
                <p><strong>Headline Clarity:</strong> Could be more specific. What problem do you solve?</p>
            `;
        }
    </script>
</body>
</html>
